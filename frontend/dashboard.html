<!DOCTYPE html>
<html>
<head>
<title>CGPA Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student Dashboard</h1>

<h2 id="welcome"></h2>

<h3>Enter Subjects</h3>

<table id="subjectTable">

<tr>
<th>S.No</th>
<th>Subject Name</th>
<th>Credits</th>
<th>Grade</th>
</tr>

<tr>
<td>1</td>

<td>
<input type="text" placeholder="Subject 1">
</td>

<td>
<input type="number">
</td>

<td>
<select>
<option>O</option>
<option>A+</option>
<option>A</option>
<option>B+</option>
<option>B</option>
<option>C</option>
</select>
</td>

</tr>

</table>

<br>

<button onclick="addSubject()">Add Subject</button>
<button onclick="removeSubject()">Remove Subject</button>
<br><br>

Previous CGPA
<input id="prev_cgpa" type="number" value="0">

Previous Credits
<input id="prev_credits" type="number" value="0">

<br><br>

<select id="formula">
<option value="9.5">CGPA × 9.5</option>
<option value="10">CGPA × 10</option>
</select>

<br><br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<br>

<h3>Save Semester</h3>

Semester Number
<input id="semester" type="number" placeholder="Semester">

<button onclick="saveSemester()">Save Semester</button>

<br><br>

<h2>Semester History</h2>

<table border="1" id="historyTable">

<tr>
<th>Semester</th>
<th>SGPA</th>
<th>CGPA</th>
</tr>

</table>

<script src="script.js"></script>

</body>
</html>
