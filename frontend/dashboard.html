<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Dashboard</h2>

Semester:
<select id="semester">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<table id="semTable">
<tr>
<th>Subject</th>
<th>Credits</th>
<th>Grade</th>
</tr>
</table>

<button onclick="addSemRow()">Add Subject</button>
<br><br>

<button onclick="saveSemester()">Save Semester</button>

<h3 id="sem_result"></h3>

<hr>

<h2>Semester History</h2>

<table id="history">
<tr>
<th>Semester</th>
<th>SGPA</th>
<th>CGPA</th>
</tr>
</table>

<script src="script.js"></script>

</body>
</html>

<script>
loadDashboard()

function loadDashboard(){

let student_id = localStorage.getItem("student_id")

fetch("http://127.0.0.1:5000/dashboard/"+student_id)

.then(res=>res.json())

.then(data=>{

let table = document.getElementById("historyTable")

data.semesters.forEach(sem => {

let row = table.insertRow()

row.innerHTML = `
<td>${sem.semester_no}</td>
<td>${sem.sgpa}</td>
<td>${sem.cgpa}</td>
`

})

})

}
</script>
