<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Student Dashboard</h1>
    </header>

    <main>
        <section class="dashboard-section">
            <label for="semester-select">Semester:</label>
            <select id="semester-select">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
                <option value="9">Semester 9</option>
                <option value="10">Semester 10</option>
            </select>

            <table id="subject-table-dashboard">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                        <th>Credits</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody id="subject-tbody">
                    <tr>
                        <td><input type="text" placeholder="Subject 1"></td>
                        <td><input type="number" placeholder="Marks"></td>
                        <td><input type="number" placeholder="Credits"></td>
                        <td>
                            <select>
                                <option value="10">A+</option>
                                <option value="9">A</option>
                                <option value="8">B+</option>
                                <option value="7">B</option>
                                <option value="6">C+</option>
                                <option value="5">C</option>
                                <option value="4">D</option>
                                <option value="0">F</option>
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>
            <button id="add-subject-dashboard">Add Subject</button>
            <button id="calculate-dashboard">Calculate SGPA/CGPA</button>
            <button id="save-semester">Save Semester</button>

            <h2>Semester Summary</h2>
            <table id="summary-table">
                <thead>
                    <tr>
                        <th>Semester</th>
                        <th>SGPA</th>
                        <th>CGPA</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- dynamically filled -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
