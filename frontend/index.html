<!DOCTYPE html>
<html>
<head>
<title>CGPA System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student CGPA Management System</h1>

<button onclick="showCalculator()">Calculator</button>
<button onclick="showRegister()">Register</button>
<button onclick="showLogin()">Login</button>

<hr>

<!-- CGPA CALCULATOR -->
<div id="calculatorSection">

<h2>Direct CGPA Calculator</h2>

<table id="subjectTable">
<tr>
<th>Subject</th>
<th>Credits</th>
<th>Grade</th>
</tr>

<tr>
<td><input type="text"></td>
<td><input type="number"></td>
<td>
<select>
<option>O</option>
<option>A+</option>
<option>A</option>
<option>B+</option>
<option>B</option>
<option>C</option>
</select>
</td>
</tr>

</table>

<button onclick="addSubject()">Add Subject</button>

<br><br>

Previous CGPA:
<input id="prev_cgpa" type="number" value="0">

Previous Credits:
<input id="prev_credits" type="number" value="0">

<br><br>

<select id="percentage_formula">
<option value="9.5">CGPA × 9.5</option>
<option value="10">CGPA × 10</option>
</select>

<br><br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

</div>

<!-- REGISTER -->
<div id="registerSection" style="display:none">

<h2>Register</h2>

<input id="reg_name" placeholder="Name"><br>
<input id="reg_email" placeholder="Email"><br>
<input id="reg_phone" placeholder="Phone"><br>
<input id="reg_college" placeholder="College"><br>
<input id="reg_course" placeholder="Course"><br>
<input id="reg_regno" placeholder="Register Number"><br>
<input id="reg_username" placeholder="Username"><br>
<input id="reg_password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>

<p id="register_msg"></p>

</div>

<!-- LOGIN -->

<div id="loginSection" style="display:none">

<h2>Login</h2>

<input id="login_username" placeholder="Username">
<input id="login_password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="login_msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
