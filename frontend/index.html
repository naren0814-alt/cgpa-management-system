<!DOCTYPE html><html>
<head>
<title>CGPA System</title>
<link rel="stylesheet" href="style.css">
</head><body style="font-family:Arial;background:linear-gradient(135deg,#74ebd5,#ACB6E5);text-align:center;"><h1 style="animation:fadeIn 1s;">Student CGPA Management System</h1><!-- MAIN BUTTONS --><button onclick="showCalculator()" style="padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#4CAF50;color:white;cursor:pointer;transition:0.3s;">
Calculator
</button><button onclick="showRegister()" style="padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#2196F3;color:white;cursor:pointer;transition:0.3s;">
Register
</button><button onclick="showLogin()" style="padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#ff9800;color:white;cursor:pointer;transition:0.3s;">
Login
</button><hr><!-- CGPA CALCULATOR --><div id="calculatorSection" style="
background:white;
padding:25px;
border-radius:10px;
width:60%;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:slideUp 0.8s;
"><h2>📊 Direct CGPA Calculator</h2><table id="subjectTable" style="margin:auto;width:100%;">
<tr>
<th>S.No</th>
<th>Subject</th>
<th>Credits</th>
<th>Grade</th>
</tr>
<tr>
<td>1</td>
<td>Subject 1</td>
<td><input type="number"></td>
<td>
<select>
<option>O</option>
<option>A+</option>
<option>A</option>
<option>B+</option>
<option>B</option>
<option>C</option>
</select>
</td>
</tr></table><br><button onclick="addSubjectcalc()" style="
background:#673ab7;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
">
Add Subject
</button>
<button onclick="removeSubject()" style="
background:#e53935;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
">
Remove Subject
</button>

<br><br>

Previous CGPA:
<input id="prev_cgpa" type="number" value="0">

Previous Credits:
<input id="prev_credits" type="number" value="0">

<br><br>

<select id="formula">
<option value="9.5">CGPA × 9.5</option>
<option value="10">CGPA × 10</option>
</select><br><br>

<button onclick="dircalculate()" style="
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:16px;
transition:0.3s;
">
Calculate
</button>

<h3 id="result"></h3></div><!-- REGISTER --><div id="registerSection" style="
display:none;
background:white;
padding:25px;
border-radius:10px;
width:40%;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:fadeIn 0.8s;
"><h2>📝 Register</h2><input id="reg_name" placeholder="Name"><br><br>
<input id="reg_email" placeholder="Email"><br><br>
<input id="reg_phone" placeholder="Phone"><br><br>
<input id="reg_college" placeholder="College"><br><br>
<input id="reg_course" placeholder="Course"><br><br>
<input id="reg_regno" placeholder="Register Number"><br><br>
<input id="reg_username" placeholder="Username"><br><br>
<input id="reg_password" type="password" placeholder="Password"><br><br>

<button onclick="register()" style="
background:#2196F3;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
">
Register
</button>

<p id="register_msg"></p></div><!-- LOGIN --><div id="loginSection" style="
display:none;
background:white;
padding:25px;
border-radius:10px;
width:35%;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:fadeIn 0.8s;
"><h2>🔐 Login</h2><input id="login_username" placeholder="Username"><br><br>
<input id="login_password" type="password" placeholder="Password"><br><br>

<button onclick="login()" style="
background:#ff9800;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
">
Login
</button>

<p id="login_msg"></p></div><!-- SIMPLE ANIMATIONS --><style>

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input,select{
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

</style><script src="script.js"></script></body>
</html>
