<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CGPA Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<div class="card">

<h1>🎓 CGPA Calculator</h1>
<p class="subtitle">Enter your subject marks to calculate CGPA</p>

<div class="inputs">

<input type="number" id="m1" placeholder="Subject 1 Mark">
<input type="number" id="m2" placeholder="Subject 2 Mark">
<input type="number" id="m3" placeholder="Subject 3 Mark">
<input type="number" id="m4" placeholder="Subject 4 Mark">
<input type="number" id="m5" placeholder="Subject 5 Mark">

</div>

<button onclick="calculateCGPA()">Calculate CGPA</button>

<h2 id="result">Your CGPA: --</h2>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
