<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student College Result Management System</title>
  <meta name="description" content="Manage student semester results and calculate CGPA easily." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border: 0; }

    :root {
      --bg: hsl(220, 15%, 5%);
      --fg: hsl(210, 20%, 92%);
      --card-bg: hsl(220, 15%, 8%);
      --primary: hsl(210, 100%, 55%);
      --primary-fg: hsl(0, 0%, 100%);
      --secondary: hsl(200, 80%, 50%);
      --muted: hsl(220, 15%, 15%);
      --muted-fg: hsl(210, 10%, 55%);
      --border: hsl(220, 15%, 18%);
      --radius: 0.75rem;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --glass-bg: hsla(220, 20%, 10%, 0.6);
      --glass-border: hsla(210, 100%, 55%, 0.15);
      --glass-shadow: 0 8px 32px 0 hsla(210, 100%, 10%, 0.5);
      --gradient-primary: linear-gradient(135deg, hsl(210, 100%, 55%), hsl(200, 80%, 50%));
      --glow-primary: 0 0 20px hsla(210, 100%, 55%, 0.5);
      --glow-input: 0 0 15px hsla(210, 100%, 55%, 0.3);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }

    /* ===== Smoke background ===== */
    .smoke-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .smoke-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
    }
    .smoke-orb-1 {
      top: -80px; left: -80px; width: 500px; height: 500px;
      background: hsla(210, 100%, 55%, 0.2);
      animation: smoke1 12s ease-in-out infinite;
    }
    .smoke-orb-2 {
      top: 33%; right: 0; width: 600px; height: 600px;
      background: hsla(200, 80%, 50%, 0.15);
      filter: blur(120px);
      animation: smoke2 15s ease-in-out infinite;
    }
    .smoke-orb-3 {
      bottom: 0; left: 25%; width: 400px; height: 400px;
      background: hsla(210, 100%, 55%, 0.1);
      filter: blur(80px);
      animation: smoke3 18s ease-in-out infinite;
    }
    .smoke-orb-4 {
      top: 50%; left: 50%; width: 500px; height: 500px;
      background: hsla(200, 80%, 50%, 0.1);
      animation: smoke4 20s ease-in-out infinite;
    }

    @keyframes smoke1 {
      0%, 100% { transform: translate(0,0) scale(1); opacity: .3; }
      25% { transform: translate(80px,-60px) scale(1.3); opacity: .5; }
      50% { transform: translate(-40px,-120px) scale(1.1); opacity: .2; }
      75% { transform: translate(60px,-40px) scale(1.4); opacity: .45; }
    }
    @keyframes smoke2 {
      0%, 100% { transform: translate(0,0) scale(1.2); opacity: .25; }
      30% { transform: translate(-100px,50px) scale(1); opacity: .4; }
      60% { transform: translate(50px,-80px) scale(1.5); opacity: .15; }
      90% { transform: translate(-30px,30px) scale(1.1); opacity: .35; }
    }
    @keyframes smoke3 {
      0%, 100% { transform: translate(0,0) scale(1); opacity: .2; }
      20% { transform: translate(60px,80px) scale(1.4); opacity: .4; }
      40% { transform: translate(-80px,20px) scale(.9); opacity: .3; }
      70% { transform: translate(30px,-60px) scale(1.3); opacity: .5; }
    }
    @keyframes smoke4 {
      0%, 100% { transform: translate(0,0) scale(1.1); opacity: .15; }
      35% { transform: translate(-60px,-90px) scale(1.5); opacity: .35; }
      65% { transform: translate(90px,40px) scale(.8); opacity: .25; }
    }

    /* ===== Layout ===== */
    .page-container {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto; padding: 2rem 1rem;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      gap: 2rem;
    }
    @media (min-width: 1024px) {
      .page-container {
        flex-direction: row; align-items: center; gap: 3rem; padding: 3rem 2rem;
      }
    }

    /* ===== Left side ===== */
    .left-side { flex: 1; display: flex; flex-direction: column; gap: 2rem; }
    @media (min-width: 1024px) { .left-side { padding-right: 2rem; } }

    .icon-box {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 1rem;
      background: hsla(210, 100%, 55%, 0.15);
      border: 1px solid hsla(210, 100%, 55%, 0.2);
      margin-bottom: 1.25rem;
    }
    .icon-box svg { width: 28px; height: 28px; color: var(--primary); }

    .page-title {
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800;
      line-height: 1.2; margin-bottom: 1rem; color: var(--fg);
    }
    .gradient-text {
      background: var(--gradient-primary);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: var(--muted-fg); font-size: 1rem; max-width: 28rem; line-height: 1.6; }

    /* Feature badges */
    .badges { display: flex; flex-wrap: wrap; gap: .75rem; }
    .badge {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem 1rem; border-radius: 9999px;
      background: hsla(220, 15%, 15%, 0.5);
      border: 1px solid var(--border);
      font-size: .875rem; color: var(--muted-fg);
    }
    .badge svg { width: 16px; height: 16px; color: var(--primary); }

    /* ===== Glass card ===== */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius);
    }

    /* ===== CGPA card ===== */
    .cgpa-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.5rem; max-width: 24rem;
    }
    .cgpa-icon {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: .75rem;
      background: hsla(210, 100%, 55%, 0.15);
      border: 1px solid hsla(210, 100%, 55%, 0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .cgpa-icon svg { width: 24px; height: 24px; color: var(--primary); }
    .cgpa-info h2 { font-size: 1rem; font-weight: 700; color: var(--fg); margin-bottom: .125rem; }
    .cgpa-info p { font-size: .75rem; color: var(--muted-fg); }
    .cgpa-btn {
      margin-left: auto; padding: .5rem 1rem; border-radius: .5rem;
      background: var(--gradient-primary); color: var(--primary-fg);
      font-weight: 600; font-size: .75rem; text-decoration: none;
      letter-spacing: .05em; white-space: nowrap;
      transition: transform .2s, box-shadow .2s; cursor: pointer;
    }
    .cgpa-btn:hover { transform: scale(1.03); box-shadow: var(--glow-primary); }

    /* ===== Auth card ===== */
    .auth-wrapper {
      width: 100%; max-width: 28rem;
    }
    @media (min-width: 1024px) {
      .auth-wrapper { min-width: 460px; flex-shrink: 0; }
    }
    .auth-card { padding: 2rem; }

    .tab-bar {
      display: flex; gap: .25rem; padding: .25rem;
      border-radius: .5rem; margin-bottom: 1.5rem;
      background: hsla(220, 15%, 15%, 0.4);
      border: 1px solid hsla(220, 15%, 18%, 0.5);
    }
    .tab-btn {
      flex: 1; padding: .625rem; border-radius: .375rem;
      font-size: .875rem; font-weight: 500;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      cursor: pointer; transition: all .3s; background: none;
      color: var(--muted-fg); font-family: var(--font-body);
    }
    .tab-btn.active {
      background: var(--gradient-primary); color: var(--primary-fg);
      box-shadow: 0 4px 12px hsla(210, 100%, 55%, 0.3);
    }
    .tab-btn svg { width: 16px; height: 16px; }

    /* Form crossfade container */
    .form-container { position: relative; overflow: hidden; transition: height .4s ease; }
    .form-face {
      transition: opacity .35s ease, transform .4s ease;
    }
    .form-face.hidden-form {
      display: none;
    }
    .form-face.entering {
      animation: formEnter .4s ease forwards;
    }
    @keyframes formEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Inputs */
    .input-group { position: relative; margin-bottom: .75rem; }
    .input-group svg {
      position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: hsla(210, 100%, 55%, 0.7);
    }
    .input-field {
      width: 100%; padding: .75rem 1rem .75rem 2.5rem;
      border-radius: .5rem; font-size: .875rem;
      background: hsla(220, 15%, 15%, 0.6);
      border: 1px solid var(--border);
      color: var(--fg); font-family: var(--font-body);
      transition: all .2s; outline: none;
    }
    .input-field::placeholder { color: var(--muted-fg); }
    .input-field:focus {
      box-shadow: var(--glow-input);
      border-color: var(--primary);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }

    .submit-btn {
      width: 100%; padding: .75rem; border-radius: .5rem;
      background: var(--gradient-primary); color: var(--primary-fg);
      font-weight: 600; font-size: .875rem; letter-spacing: .05em;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
      font-family: var(--font-body); margin-top: .25rem;
    }
    .submit-btn:hover { transform: scale(1.03); box-shadow: var(--glow-primary); }
    .submit-btn:active { transform: scale(.98); }

    .switch-text {
      text-align: center; font-size: .875rem; color: var(--muted-fg); margin-top: 1rem;
    }
    .switch-text button {
      background: none; color: var(--primary); font-weight: 600;
      cursor: pointer; font-family: var(--font-body); font-size: .875rem;
    }
    .switch-text button:hover { text-decoration: underline; }

    /* ===== Fade-in animation ===== */
    .fade-left {
      opacity: 0; transform: translateX(-40px);
      animation: fadeLeft .7s ease-out forwards;
    }
    .fade-right {
      opacity: 0; transform: translateX(40px);
      animation: fadeRight .7s .2s ease-out forwards;
    }
    @keyframes fadeLeft {
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeRight {
      to { opacity: 1; transform: translateX(0); }
    }
    .fade-up {
      opacity: 0; transform: translateY(20px);
      animation: fadeUp .5s .5s ease-out forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Animated smoke background -->
<div class="smoke-bg">
  <div class="smoke-orb smoke-orb-1"></div>
  <div class="smoke-orb smoke-orb-2"></div>
  <div class="smoke-orb smoke-orb-3"></div>
  <div class="smoke-orb smoke-orb-4"></div>
</div>

<div class="page-container">
  <!-- Left side -->
  <div class="left-side fade-left">
    <div>
      <div class="icon-box">
        <!-- Graduation cap icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
      </div>
      <h1 class="page-title">
        Student College Result<br />
        <span class="gradient-text">Management System</span>
      </h1>
      <p class="subtitle">Manage student semester results and calculate CGPA easily.</p>
    </div>

    <!-- Feature badges -->
    <div class="badges">
      <div class="badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
        Smart Analytics
      </div>
      <div class="badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
        Semester Tracking
      </div>
      <div class="badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16l4-8 4 4 4-8"/></svg>
        CGPA Reports
      </div>
    </div>

    <!-- CGPA Calculator card -->
    <div class="glass-card cgpa-card fade-up">
      <div class="cgpa-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
      </div>
      <div class="cgpa-info">
        <h2>Direct CGPA Calculator</h2>
        <p>Calculate SGPA &amp; CGPA without logging in.</p>
      </div>
      <a href="calculator.html" class="cgpa-btn">Open</a>
    </div>
  </div>

  <!-- Right side — Auth Card -->
  <div class="auth-wrapper fade-right">
    <div class="glass-card auth-card">
      <div class="tab-bar">
        <button class="tab-btn active" id="loginTab" onclick="switchTab(true)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Login
        </button>
        <button class="tab-btn" id="registerTab" onclick="switchTab(false)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
          Register
        </button>
      </div>

      <div class="form-container" id="formContainer">
        <!-- Login face -->
        <form class="form-face" id="loginForm" onsubmit="handleLogin(event)">
          <div class="input-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" class="input-field" placeholder="Username" required />
          </div>
          <div class="input-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="input-field" placeholder="Password" required />
          </div>
          <button type="submit" class="submit-btn">Login</button>
          <div class="switch-text">
            Don't have an account? <button type="button" onclick="switchTab(false)">Register</button>
          </div>
        </form>

        <!-- Register face -->
        <form class="form-face hidden-form" id="registerForm" onsubmit="handleRegister(event)">
          <div class="grid-2">
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" class="input-field" placeholder="Full Name" required />
            </div>
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="email" class="input-field" placeholder="Email" required />
            </div>
          </div>
          <div class="grid-2">
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <input type="tel" class="input-field" placeholder="Phone Number" />
            </div>
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 22v-4a2 2 0 1 0-4 0v4"/><path d="m18 10 3.447 1.724a1 1 0 0 1 .553.894V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-7.382a1 1 0 0 1 .553-.894L6 10"/><path d="M18 5v17"/><path d="m4 6 7.106-3.553a2 2 0 0 1 1.788 0L20 6"/><path d="M6 5v17"/></svg>
              <input type="text" class="input-field" placeholder="College Name" />
            </div>
          </div>
          <div class="grid-2">
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
              <input type="text" class="input-field" placeholder="Course Name" />
            </div>
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>
              <input type="text" class="input-field" placeholder="Register Number" />
            </div>
          </div>
          <div class="input-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" class="input-field" placeholder="Username" required />
          </div>
          <div class="input-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="input-field" placeholder="Password" required />
          </div>
          <button type="submit" class="submit-btn">Register</button>
          <div class="switch-text">
            Already have an account? <button type="button" onclick="switchTab(true)">Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function switchTab(isLogin) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');

    if (isLogin) {
      registerForm.classList.add('hidden-form');
      registerForm.classList.remove('entering');
      loginForm.classList.remove('hidden-form');
      loginForm.classList.add('entering');
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
    } else {
      loginForm.classList.add('hidden-form');
      loginForm.classList.remove('entering');
      registerForm.classList.remove('hidden-form');
      registerForm.classList.add('entering');
      loginTab.classList.remove('active');
      registerTab.classList.add('active');
    }
  }

  function handleLogin(e) {
