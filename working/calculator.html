<!DOCTYPE html><html>
<head>
<title>CGPA Dashboard</title>
<link rel="stylesheet" href="style.css">
</head><body style="font-family:Arial;background:linear-gradient(135deg,#89f7fe,#66a6ff);text-align:center;"><h1 style="animation:fadeIn 1s;">🎓 Student Dashboard</h1><h2 id="welcome"></h2><div style="
background:white;
padding:25px;
border-radius:12px;
width:70%;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:slideUp 0.8s;
"><h3>📚 Enter Subjects</h3><table id="subjectTable" style="width:100%;margin:auto;border-collapse:collapse;"><tr>
<th>S.No</th>
<th>Subject Name</th>
<th>Credits</th>
<th>Grade</th>
</tr><tr>
<td>1</td><td>
<input type="text" placeholder="Subject 1">
</td><td>
<input type="number">
</td><td>
<select>
<option>O</option>
<option>A+</option>
<option>A</option>
<option>B+</option>
<option>B</option>
<option>C</option>
</select>
</td></tr></table><br><button onclick="addSubject()" style="
background:#4CAF50;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin:5px;
transition:0.3s;
">
Add Subject
</button>

<button onclick="removeSubject()" style="
background:#f44336;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin:5px;
transition:0.3s;
">
Remove Subject
</button>

<br><br>

<b>Previous CGPA</b>
<input id="prev_cgpa" type="number" value="0">

<b>Previous Credits</b>
<input id="prev_credits" type="number" value="0">

<br><br>

<select id="formula">
<option value="9.5">CGPA × 9.5</option>
<option value="10">CGPA × 10</option>
</select><br><br>

<button onclick="calculate()" style="
background:#673ab7;
color:white;
border:none;
padding:12px 22px;
border-radius:6px;
cursor:pointer;
font-size:16px;
transition:0.3s;
">
Calculate
</button>

<h3 id="result"></h3><br><h3>💾 Save Semester</h3>Semester Number
<input id="semester" type="number" placeholder="Semester">

<button onclick="saveSemester()" style="
background:#2196F3;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-left:10px;
transition:0.3s;
">
Save Semester
</button>

<br><br>

<h2>📊 Semester History</h2><table border="1" id="historyTable" style="
width:60%;
margin:auto;
border-collapse:collapse;
background:white;
"><tr>
<th>Semester</th>
<th>SGPA</th>
<th>CGPA</th>
</tr></table></div><style>

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button:hover{
transform:scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

input,select{
padding:8px;
border-radius:5px;
border:1px solid #ccc;
margin:5px;
}

th{
background:#f2f2f2;
padding:8px;
}

td{
padding:8px;
}

</style><script src="script.js"></script></body>
</html>
